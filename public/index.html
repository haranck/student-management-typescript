
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8" />
    <title>Student Management</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      /* Modern Professional Styling */
      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        --danger-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        --dark-bg: #0f0f23;
        --card-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.8);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--dark-bg);
        background-image: radial-gradient(
            circle at 20% 80%,
            rgba(120, 119, 198, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(255, 119, 198, 0.3) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 40% 40%,
            rgba(120, 200, 255, 0.2) 0%,
            transparent 50%
          );
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text-primary);
        overflow-x: hidden;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      /* Header Styling */
      h1 {
        text-align: center;
        font-size: 3rem;
        font-weight: 700;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 3rem;
        position: relative;
      }

      h1::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 4px;
        background: var(--primary-gradient);
        border-radius: 2px;
      }

      /* Glass Card Effect */
      .glass-card {
        background: var(--card-bg);
        /* backdrop-filter: blur(20px); */
        /* -webkit-backdrop-filter: blur(20px); */
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
      }

      .glass-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      }

      /* Modern Button Styling */
      .btn-modern {
        background: var(--primary-gradient);
        border: none;
        border-radius: 50px;
        padding: 12px 30px;
        color: white;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        position: relative;
        overflow: hidden;
      }

      .btn-modern::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.2),
          transparent
        );
        transition: left 0.5s;
      }

      .btn-modern:hover::before {
        left: 100%;
      }

      .btn-modern:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }

      .btn-success-modern {
        background: var(--success-gradient);
        box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
      }

      .btn-warning-modern {
        background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
        box-shadow: 0 4px 15px rgba(255, 234, 167, 0.4);
        color: #2d3436;
      }

      .btn-danger-modern {
        background: var(--danger-gradient);
        box-shadow: 0 4px 15px rgba(250, 112, 154, 0.4);
      }

      /* Table Styling */
      .table-container {
        background: var(--card-bg);
        /* backdrop-filter: blur(20px); */
        border-radius: 20px;
        padding: 2rem;
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
        margin-top: 2rem;
      }

      .table {
        background: transparent;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }

      .table thead th {
        background: var(--primary-gradient);
        color: white;
        border: none;
        padding: 1rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
      }

      .table tbody tr {
        background: rgba(255, 255, 255, 0.05);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }

      .table tbody tr:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.02);
      }

      .table tbody td {
        padding: 1rem;
        border: none;
        color: rgb(6 10 59 / 80%);
        font-weight: 500;
      }

      /* Modal Styling */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        /* backdrop-filter: blur(10px); */
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        opacity: 0;
        transition: all 0.3s ease;
      }

      .modal-overlay.active {
        display: flex;
        opacity: 1;
      }

      .modal-content {
        background: var(--card-bg);
        /* backdrop-filter: blur(30px); */
        padding: 2.5rem;
        border-radius: 25px;
        width: 100%;
        max-width: 500px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        transform: scale(0.8);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .modal-overlay.active .modal-content {
        transform: scale(1);
      }

      .modal-content::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--primary-gradient);
      }

      .modal-content h5 {
        color: var(--text-primary);
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        text-align: center;
      }

      /* Form Styling */
      .form-control {
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        padding: 12px 20px;
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.3s ease;
        margin-bottom: 1rem;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #667eea;
        box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        outline: none;
        color: var(--text-primary);
      }

      .form-control::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      /* Button Group */
      .btn-group-modern {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 1.5rem;
      }

      .btn-group-modern .btn {
        flex: 1;
        max-width: 120px;
      }

      /* Action Buttons */
      .action-btn {
        border: none;
        border-radius: 10px;
        padding: 8px 15px;
        margin: 0 3px;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .action-btn:hover {
        transform: translateY(-2px);
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(50px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .animate-fade-in {
        animation: fadeInUp 0.6s ease-out;
      }

      .animate-slide-in {
        animation: slideInRight 0.5s ease-out;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        h1 {
          font-size: 2rem;
        }

        .table-container {
          padding: 1rem;
        }

        .modal-content {
          margin: 1rem;
          padding: 1.5rem;
        }

        .btn-group-modern {
          flex-direction: column;
        }

        .btn-group-modern .btn {
          max-width: none;
        }
      }

      /* Loading Animation */
      .loading {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Add Student Button */
      .add-student-btn {
        background: var(--success-gradient);
        border: none;
        border-radius: 50px;
        padding: 15px 40px;
        color: white;
        font-weight: 700;
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        margin-bottom: 2rem;
        position: relative;
        overflow: hidden;
      }

      .add-student-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
      }

      .add-student-btn i {
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="animate-fade-in">
        <i class="fas fa-graduation-cap"></i> Student Management System
      </h1>

      <div class="text-center animate-slide-in">
        <button class="add-student-btn" onclick="openAdd()">
          <i class="fas fa-plus"></i>Add New Student
        </button>
      </div>

      <div class="table-container glass-card animate-fade-in">
        <table class="table">
          <thead>
            <tr>
              <th><i class="fas fa-user"></i> Name</th>
              <th><i class="fas fa-birthday-cake"></i> Age</th>
              <th><i class="fas fa-book"></i> Course</th>
              <th><i class="fas fa-cogs"></i> Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Enhanced Modal -->
    <div class="modal-overlay" id="editModal">
      <div class="modal-content">
        <h5 id="modalTitle"><i class="fas fa-user-edit"></i> Edit Student</h5>
        <input type="hidden" id="editId" />

        <div class="form-group">
          <input
            class="form-control"
            id="editName"
            placeholder="Enter student name"
          />
        </div>

        <div class="form-group">
          <input
            class="form-control"
            id="editAge"
            placeholder="Enter age"
            type="number"
          />
        </div>

        <div class="form-group">
          <input
            class="form-control"
            id="editCourse"
            placeholder="Enter course name"
          />
        </div>

        <div class="btn-group-modern">
          <button class="btn btn-secondary btn-modern" onclick="closeEdit()">
            <i class="fas fa-times"></i> Cancel
          </button>
          <button class="btn btn-primary btn-modern" onclick="saveEdit()">
            <i class="fas fa-save"></i> Save
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      async function loadStudents() {
        const res = await fetch("/students");
        const students = await res.json();
        const table = document.getElementById("studentTableBody");
        table.innerHTML = "";
        students.forEach((s) => {
          table.innerHTML += `
            <tr>
            <td><i class="fas fa-user-circle"></i> ${s.name}</td>
            <td><i class="fas fa-calendar-alt"></i> ${s.age}</td>
            <td><i class="fas fa-book-open"></i> ${s.course}</td>
            <td>
                <button class="btn btn-warning-modern action-btn" 
                onclick="openEdit('${s.id}', '${s.name}', ${s.age}, '${s.course}')">
                <i class="fas fa-edit"></i> Edit</button>
                <button class="btn btn-danger-modern action-btn" 
                onclick="deleteStudent('${s.id}')">
                <i class="fas fa-trash-alt"></i> Delete</button>
            </td>
            </tr>`;
        });
      }

      function openEdit(id, name, age, course) {
        document.getElementById("editId").value = id;
        document.getElementById("editName").value = name;
        document.getElementById("editAge").value = age;
        document.getElementById("editCourse").value = course;
        document.getElementById("modalTitle").innerHTML =
          '<i class="fas fa-user-edit"></i> Edit Student';
        document.getElementById("editModal").classList.add("active");
      }

      function closeEdit() {
        document.getElementById("editModal").classList.remove("active");
      }

      function openAdd() {
        document.getElementById("modalTitle").innerHTML =
          '<i class="fas fa-user-plus"></i> Add New Student';
        document.getElementById("editId").value = "";
        document.getElementById("editName").value = "";
        document.getElementById("editAge").value = "";
        document.getElementById("editCourse").value = "";
        document.getElementById("editModal").classList.add("active");
      }

      async function saveEdit() {
        const id = document.getElementById("editId").value;
        const name = document.getElementById("editName").value;
        const age = parseInt(document.getElementById("editAge").value);
        const course = document.getElementById("editCourse").value;

        if (!name || !age || !course) {
          Swal.fire({
            icon: "error",
            title: "Validation Error",
            text: "Please fill in all fields",
            confirmButtonColor: "#667eea",
          });
          return;
        }

        const method = id ? "PUT" : "POST";
        const url = id ? `/students/${id}` : "/students";

        try {
          const response = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, age, course }),
          });

          if (!response.ok) {
            throw new Error("Failed to save student");
          }

          closeEdit();
          loadStudents();
          Swal.fire({
            icon: "success",
            title: "Success!",
            text: "Student saved successfully!",
            confirmButtonColor: "#667eea",
          });
        } catch (error) {
          Swal.fire({
            icon: "error",
            title: "Error",
            text: "Error saving student: " + error.message,
            confirmButtonColor: "#667eea",
          });
        }
      }

      async function deleteStudent(id) {
        const result = await Swal.fire({
          title: "Are you sure?",
          text: "You won't be able to revert this!",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#fa709a",
          cancelButtonColor: "#667eea",
          confirmButtonText: "Yes, delete it!",
          cancelButtonText: "Cancel",
        });

        if (result.isConfirmed) {
          try {
            const response = await fetch(`/students/${parseInt(id)}`, {
              method: "DELETE",
            });
            if (!response.ok) {
              throw new Error("Failed to delete student");
            }

            await loadStudents();

            Swal.fire({
              icon: "success",
              title: "Deleted!",
              text: "Student has been deleted.",
              confirmButtonColor: "#667eea",
            });
          } catch (error) {
            Swal.fire({
              icon: "error",
              title: "Error",
              text: "Error deleting student: " + error.message,
              confirmButtonColor: "#667eea",
            });
          }
        }
      }

      loadStudents();
    </script>
  </body>
</html>
